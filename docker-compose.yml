services:
  mysql:
    image: mysql:latest
    container_name: ${DB_CONTAINER_NAME}
    ports:
      - ${DB_PORT}:3306
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-vl:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: ${REDIS_CONTAINER_NAME}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-vl:/data

volumes:
  mysql-vl:
    driver: local
  redis-vl:
    driver: local
