services:
  mysql:
    image: mysql:8.0
    container_name: ${DB_CONTAINER_NAME}
    env_file:
      - ./.env
    ports:
      - ${DB_PORT}:3306
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-vl:/var/lib/mysql
    networks:
      - wemo-network

  redis:
    image: redis:latest
    container_name: ${REDIS_CONTAINER_NAME}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - redis-vl:/data
    networks:
      - wemo-network

  wemo-testdb:
    image: mysql:latest
    container_name: ${TEST_DB_CONTAINER_NAME}
    ports:
      - ${TEST_DB_PORT}:3306
    restart: always
    environment:
      MYSQL_DATABASE: ${TEST_DB_NAME}
      MYSQL_ROOT_PASSWORD: ${TEST_DB_PASSWORD}
    volumes:
      - wemo-testdb-vl:/var/lib/mysql
    networks:
      - wemo-network

  app-blue:
    image: 0304ohyeryung/wemo:latest
    container_name: wemo-blue
    platform: linux/amd64
    ports:
      - "8081:8080"
    env_file:
      - ./.env
    networks:
      - wemo-network
    depends_on:
      - redis
      - mysql

  app-green:
    image: 0304ohyeryung/wemo:latest
    container_name: wemo-green
    platform: linux/amd64
    ports:
      - "8082:8080"
    env_file:
      - ./.env
    networks:
      - wemo-network
    depends_on:
      - redis
      - mysql

networks:
  wemo-network:
    driver: bridge

volumes:
  mysql-vl:
    driver: local
  redis-vl:
    driver: local
  wemo-testdb-vl:
    driver: local
