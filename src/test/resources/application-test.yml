spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: create  # 애플리케이션 시작 시 엔티티 기반으로 생성
    show-sql: true  # SQL 쿼리 로그 출력
  sql:
    init:
      mode: embedded  # 내장 DB에서만 실행
