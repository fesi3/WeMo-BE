name: Java CI with Gradle

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # .env 파일을 Secrets에서 받아 생성
    - name: Create .env file from PROD_ENV Secrets
      run: |
        echo "${{ secrets.PROD_ENV }}" > .env
        cat .env # .env 파일 확인용

    # Gradle 설정 (캐싱 포함)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    # Gradle 빌드
    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # Docker 이미지 빌드 및 푸시
    - name: Build Docker image
      run: |
        docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/wemo --push .

    # Docker 로그인
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # Docker Hub에 이미지 푸시
    - name: Docker Hub push
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/wemo

    # .env 파일 정리
    - name: Cleanup .env file
      run: rm .env
      
  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gradle 의존성 그래프 생성 및 제출
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
