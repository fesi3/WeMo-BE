name: Java CI with Gradle

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --exclude-task test

      - name: 배포용 .env 파일 생성
        if: github.event_name == 'push'
        run: echo "${{ secrets.PROD_ENV }}" > .env

      - name: Docker login
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        if: github.event_name == 'push'
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/wemo --push .

      - name: Docker Hub push
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/wemo

      - name: Cleanup .env file
        run: rm -f .env

      # CD 배포 작업 트리거 추가
      - name: Trigger CD deployment
        if: github.event_name == 'push'
        uses: peter-evans/workflow-dispatch@v1
        with:
          workflow: "deploy-to-ec2.yml"  # CD 배포 워크플로우 파일 이름
          ref: refs/heads/dev  # CI가 실행된 브랜치
