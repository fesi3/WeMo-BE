name: CI/CD Workflow

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 м„Өм •
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --exclude-task test

      - name: л°°нҸ¬мҡ© .env нҢҢмқј мғқм„ұ
        if: github.event_name == 'push'
        run: echo "${{ secrets.PROD_ENV }}" > .env

      - name: Docker login
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        run: docker build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/wemo:latest --push .

      - name: Cleanup .env file
        run: rm -f .env

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check the code status
        run: echo "Code check complete."

  deploy:
    runs-on: ubuntu-latest
    needs: build  # build мһ‘м—…мқҙ мҷ„лЈҢлҗң нӣ„ мӢӨн–ү
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: EC2 м ‘мҶҚ нӣ„ Blue-Green л°°нҸ¬ мҲҳн–ү
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "рҹ”Қ нҳ„мһ¬ нҷңм„ұнҷ”лҗң м»Ён…Ңмқҙл„Ҳ нҷ•мқё..."
            ACTIVE_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E 'wemo-blue|wemo-green' | head -n 1)

            if [ "$ACTIVE_CONTAINER" == "wemo-blue" ]; then
                IDLE_CONTAINER="wemo-green"
            elif [ "$ACTIVE_CONTAINER" == "wemo-green" ]; then
                IDLE_CONTAINER="wemo-blue"
            else
                echo "вҡ пёҸ нҷңм„ұнҷ”лҗң м»Ён…Ңмқҙл„Ҳк°Җ м—ҶмҠөлӢҲлӢӨ. кё°ліём ҒмңјлЎң wemo-blueлҘј IDLE_CONTAINERлЎң м„Өм •н•©лӢҲлӢӨ."
                IDLE_CONTAINER="wemo-blue"
            fi

            echo "рҹҡҖ мғҲлЎңмҡҙ лІ„м „ мӢӨн–ү мӨ‘: $IDLE_CONTAINER"
            docker-compose -f /home/ubuntu/docker-compose.yml up -d --build $IDLE_CONTAINER

            echo "вҸі м»Ён…Ңмқҙл„Ҳ мӢӨн–ү нҷ•мқё..."
            for i in {1..10}; do
                if docker ps --format "{{.Names}}" | grep -q "$IDLE_CONTAINER"; then
                    echo "вң… м»Ён…Ңмқҙл„Ҳк°Җ м •мғҒм ҒмңјлЎң мӢӨн–үлҗҳм—ҲмҠөлӢҲлӢӨ."
                    break
                fi
                echo "вҸі м»Ён…Ңмқҙл„Ҳ мӢӨн–ү лҢҖкё° мӨ‘..."
                sleep 2
            done

            if ! docker ps --format "{{.Names}}" | grep -q "$IDLE_CONTAINER"; then
                echo "вқҢ м»Ён…Ңмқҙл„Ҳ мӢӨн–ү мӢӨнҢЁ. л°°нҸ¬ мӨ‘лӢЁ."
                exit 1
            fi

            echo "рҹ”Җ Nginx нҠёлһҳн”Ҫ м „нҷҳ"
            if [ "$IDLE_CONTAINER" == "wemo-green" ]; then
                sed -i 's/wemo-blue/wemo-green/g' /home/ubuntu/nginx/nginx.conf
            else
                sed -i 's/wemo-green/wemo-blue/g' /home/ubuntu/nginx/nginx.conf
            fi
            docker exec wemo-nginx nginx -s reload

            if [ -n "$ACTIVE_CONTAINER" ]; then
                echo "рҹӣ‘ кё°мЎҙ м»Ён…Ңмқҙл„Ҳ мӨ‘м§Җ: $ACTIVE_CONTAINER"
                docker stop $ACTIVE_CONTAINER
                docker rm $ACTIVE_CONTAINER
            else
                echo "вҡ пёҸ кё°мЎҙ м»Ён…Ңмқҙл„Ҳк°Җ м—Ҷм–ҙ мӨ‘м§Җн•  н•„мҡ”к°Җ м—ҶмҠөлӢҲлӢӨ."
            fi
