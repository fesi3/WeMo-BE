name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # 추가적인 빌드 작업이 필요하면 여기에 추가하세요.

  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check the code status
        run: echo "Code check complete."

  deploy:
    runs-on: ubuntu-latest
    needs: build  # build 작업이 완료된 후 실행
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: EC2 접속 후 Blue-Green 배포 수행
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🔍 현재 활성화된 컨테이너 확인..."
            ACTIVE_CONTAINER=$(docker ps --format "{{.Names}}" | grep -E 'wemo-blue|wemo-green' | head -n 1)

            if [ "$ACTIVE_CONTAINER" == "wemo-blue" ]; then
                IDLE_CONTAINER="wemo-green"
            elif [ "$ACTIVE_CONTAINER" == "wemo-green" ]; then
                IDLE_CONTAINER="wemo-blue"
            else
                echo "⚠️ 활성화된 컨테이너가 없습니다. 기본적으로 wemo-blue를 IDLE_CONTAINER로 설정합니다."
                IDLE_CONTAINER="wemo-blue"
            fi

            echo "🚀 새로운 버전 실행 중: $IDLE_CONTAINER"
            docker-compose -f /home/ubuntu/docker-compose.yml up -d --build $IDLE_CONTAINER

            echo "⏳ 컨테이너 실행 확인..."
            for i in {1..10}; do
                if docker ps --format "{{.Names}}" | grep -q "$IDLE_CONTAINER"; then
                    echo "✅ 컨테이너가 정상적으로 실행되었습니다."
                    break
                fi
                echo "⏳ 컨테이너 실행 대기 중..."
                sleep 2
            done

            if ! docker ps --format "{{.Names}}" | grep -q "$IDLE_CONTAINER"; then
                echo "❌ 컨테이너 실행 실패. 배포 중단."
                exit 1
            fi

            echo "🔀 Nginx 트래픽 전환"
            if [ "$IDLE_CONTAINER" == "wemo-green" ]; then
                sed -i 's/wemo-blue/wemo-green/g' /home/ubuntu/nginx/nginx.conf
            else
                sed -i 's/wemo-green/wemo-blue/g' /home/ubuntu/nginx/nginx.conf
            fi
            docker exec wemo-nginx nginx -s reload

            if [ -n "$ACTIVE_CONTAINER" ]; then
                echo "🛑 기존 컨테이너 중지: $ACTIVE_CONTAINER"
                docker stop $ACTIVE_CONTAINER
                docker rm $ACTIVE_CONTAINER
            else
                echo "⚠️ 기존 컨테이너가 없어 중지할 필요가 없습니다."
            fi
